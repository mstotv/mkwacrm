# نظام العلامة البيضاء (White Label)

نظام "الوايت ليبل" (العلامة البيضاء) هو الميزة البرمجية التي تسمح لعملائك باستخدام منصتك وتقديمها لعملائهم أو فريقهم تحت اسم شركتهم الخاصة، وبشعارهم، وألوانهم، ورابط موقعهم، مع إخفاء أي أثر لاسم منصتك الأصلية (MKWhats). 

هذه الميزة تحول منصتك من أداة للمستخدم النهائي (B2C) إلى منصة بنية تحتية للشركات (B2B)، مما يسمح لك ببيع خطط بأسعار مرتفعة جداً.

---

## 🚀 المميزات الرئيسية لنظام الوايت ليبل

### 1. النطاق المخصص (Custom Domains / Subdomains)
- **الميزة:** يمكن للعميل ربط نطاقه الخاص بالمنصة. بدلاً من دخول موظفيه أو عملائه إلى `app.mkwhats.com`، سيدخلون إلى `app.customer-company.com`.
- **كيف تعمل؟:** 
  - يقوم العميل بإضافة سجل `CNAME` في إعدادات الدومين الخاص به (مثل GoDaddy أو Cloudflare) وتوجيهه إلى سيرفرات المنصة.
  - تقوم منصتنا برصد هذا التوجيه وإصدار شهادة أمان `SSL` تلقائياً ليصبح الرابط آمناً `https`.
  - يقوم الـ `Middleware` في خوادمنا بفلترة الطلبات وعرض بيانات العميل بناءً على الرابط الذي دخل منه الزائر.

### 2. التخصيص البصري والهوية (Branding & Theming)
- **الميزة:** واجهة مستخدم تعكس هوية شركة العميل بالكامل.
- **التفاصيل:**
  - **الشعار (Logo):** رفع شعار الشركة ليظهر في شريط التنقل (Navbar) وقائمة السحب (Sidebar) وصفحات تسجيل الدخول.
  - **الأيقونة (Favicon):** تغيير أيقونة المتصفح التي تظهر بجانب اسم التبويب.
  - **الألوان (Brand Colors):** اختيار اللون الأساسي (Primary Color) الذي سيحل محل اللون الافتراضي للمنصة في الأزرار، الإشعارات، والرسوم البيانية.
  - **اسم المنصة:** تغيير النصوص التي تظهر في عناوين الصفحات (Page Titles) ورسائل الترحيب لتعرض اسم شركة العميل.

### 3. إزالة الحقوق (Remove Powered By)
- **الميزة:** إخفاء الهوية الأصلية للمنصة تماماً.
- **التفاصيل:** 
  - إزالة جملة `Powered by MKWhats` من التذييل (Footer).
  - إزالة أي روابط تشير إلى صفحات الدعم الفني، أو سياسة الخصوصية الخاصة بك.
  - السماح للعميل بوضع روابط الدعم الفني، وأرقام التواصل، وسياسة الخصوصية الخاصة بشركته هو.

### 4. خوادم البريد الإلكتروني المخصصة (Custom SMTP)
- **الميزة:** إرسال الإشعارات ورسائل النظام من بريد العميل.
- **التفاصيل:** 
  - عندما يقوم النظام بإرسال إيميل (مثلاً: دعوة موظف جديد، استعادة كلمة المرور، أو إشعارات النظام)، فإن الإيميل سيصل من `noreply@customer-company.com` بدلاً من إيميل منصتك.
  - يتطلب ذلك توفير حقول للعميل لإدخال بيانات خادم البريد الخاص به (Host, Port, Username, Password).

### 5. واجهة تسجيل دخول مخصصة (Custom Login Page)
- **الميزة:** صفحة دخول لا تشير إلى المنصة الأم.
- **التفاصيل:** تصميم صفحة تسجيل دخول ترحب بالزوار باسم شركة العميل وتعرض خلفيته وشعاره الخاص، مما يعطي انطباعاً بأن النظام برمجة خاصة للشركة.

---

## 🛠️ كيف يتم بناؤها تقنياً؟ (البنية التحتية)

بناء هذه الميزة يتطلب هندسة برمجية متقدمة لضمان عزل البيانات وسرعة الاستجابة:

1. **قاعدة البيانات (Database - Supabase):**
   - إنشاء جدول `white_label_settings`.
   - يحتوي على: `account_id`, `domain`, `logo_url`, `favicon_url`, `primary_color`, `smtp_settings`.

2. **الـ Middleware في Next.js (حارس البوابات):**
   - هو ملف يعمل على مستوى الخادم قبل تحميل أي صفحة.
   - يقرأ الـ `Hostname` (الرابط الذي طلبه الزائر).
   - إذا كان الرابط دومين خارجي مخصص، يقوم بطلب إعدادات الـ White Label من قاعدة البيانات.
   - يحقن الألوان والشعارات في الـ `HTML` قبل إرسالها لمتصفح الزائر.

3. **لوحة التحكم (User Panel):**
   - واجهة للمشتركين في خطة الوايت ليبل تتيح لهم:
     - إدخال الدومين والتحقق من صحة ربطه (DNS Checker).
     - رفع الصور باستخدام أدوات الرفع الخاصة بنا (Storage).
     - اختيار الألوان عبر لاقط الألوان (Color Picker).

---

## 💰 الفائدة التجارية (لماذا هي مهمة؟)

1. **تسعير استثنائي (Premium Pricing):** خطط الوايت ليبل تُباع بأضعاف أسعار الخطط العادية. إذا كانت الخطة العادية بـ 49$، يمكن بيع الوايت ليبل بـ 299$ أو حتى 499$ شهرياً.
2. **استهداف وكالات التسويق (Agencies):** وكالات التسويق تبحث دائماً عن برمجيات جاهزة لتقديمها لعملائها تحت اسمها الخاص دون الحاجة لدفع تكاليف برمجة من الصفر.
3. **ولاء العملاء (Retention):** العميل الذي يربط دومينه ويرفع شعاره ويسوق المنصة باسمه، من الصعب جداً أن يلغي اشتراكه لأنه بنى عمله فوق بنيتك التحتية.
